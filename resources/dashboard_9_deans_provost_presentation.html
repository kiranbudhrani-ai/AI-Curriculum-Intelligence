<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Curriculum Intelligence: 2026 Catalog Growth Signals</title>
</head>
<body>
<noscript>This presentation requires JavaScript.</noscript>
<script>
(async()=>{
  const source='https://cdn.jsdelivr.net/gh/kiranbudhrani-ai/AI-Course-Signals@661708255095fa7a0afd4e79d006517551463cdd/resources/dashboard_9_deans_provost_presentation.html';

  function patchSection11(){
    const clean=el=>(el&&el.textContent?el.textContent:'').replace(/\s+/g,' ').trim();
    const exactLeaf=value=>[...document.querySelectorAll('body *')].find(el=>el.children.length===0&&clean(el)===value);
    let attempts=0;
    const timer=setInterval(()=>{
      attempts+=1;
      if(document.querySelector('[data-added-distinct-courses="true"]')){clearInterval(timer);return;}
      const label=exactLeaf('Total AI integrity cases');
      if(!label){if(attempts>=120)clearInterval(timer);return;}

      let card=label;
      while(card&&card!==document.body){
        const text=clean(card);
        if(text.includes('218')&&text.includes('Total AI integrity cases')&&text.length<240)break;
        card=card.parentElement;
      }
      if(!card||card===document.body){if(attempts>=120)clearInterval(timer);return;}

      let group=card.parentElement;
      while(group&&group!==document.body){
        const text=clean(group);
        if(text.includes('218')&&text.includes('85')&&text.includes('133')&&text.includes('2024–2025 cases')&&text.includes('2025–2026 cases'))break;
        group=group.parentElement;
      }
      if(!group||group===document.body){if(attempts>=120)clearInterval(timer);return;}

      const clone=card.cloneNode(true);
      const leaves=[...clone.querySelectorAll('*')].filter(el=>el.children.length===0);
      const value=leaves.find(el=>clean(el)==='218');
      const caption=leaves.find(el=>clean(el)==='Total AI integrity cases');
      if(!value||!caption){if(attempts>=120)clearInterval(timer);return;}

      value.textContent='65';
      caption.textContent='Distinct courses with cases';
      clone.setAttribute('data-added-distinct-courses','true');
      group.setAttribute('data-ai-integrity-metrics','true');
      group.appendChild(clone);

      const style=document.createElement('style');
      style.textContent='[data-ai-integrity-metrics="true"]{grid-template-columns:repeat(4,minmax(0,1fr))!important}@media(max-width:820px){[data-ai-integrity-metrics="true"]{grid-template-columns:repeat(2,minmax(0,1fr))!important}}@media(max-width:520px){[data-ai-integrity-metrics="true"]{grid-template-columns:1fr!important}}';
      document.head.appendChild(style);
      clearInterval(timer);
    },250);
  }

  try{
    const response=await fetch(source,{cache:'no-store'});
    if(!response.ok)throw new Error('Source request failed');
    let html=await response.text();
    const patch='<script>('+patchSection11.toString()+')();<\/script>';
    html=html.replace(/<\/body>/i,patch+'</body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML='<main style="font-family:Arial,sans-serif;max-width:760px;margin:80px auto;padding:24px"><h1>Presentation temporarily unavailable</h1><p>Please refresh the page.</p></main>';
  }
})();
</script>
</body>
</html>
